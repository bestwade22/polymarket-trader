version = 0.1

[default.global.parameters]
stack_name = "polymarket-trader"

[default.build.parameters]
cached = true
parallel = true

[default.deploy.parameters]
capabilities = "CAPABILITY_IAM CAPABILITY_NAMED_IAM"
confirm_changeset = false
resolve_s3 = true
resolve_image_repos = true
region = "ap-east-1"
# Override on first deploy: sam deploy --parameter-overrides GitHubRepo=owner/polymarket-trader
parameter_overrides = "GitHubRepo=OWNER/REPO GitBranch=main TradingWindowStartHour=13:30 TradingWindowEndHour=15:30 ShareCount=15 OrderExpiryMinutes=55 StopLossPct=50 StopLossPctFloor=10 StopLossDryRun=false StopLossOrderExpiryMinutes=13"

[default.package.parameters]
resolve_s3 = true

[default.sync.parameters]
watch = true

[default.local_start_api.parameters]
warm_containers = "EAGER"

[default.local_start_lambda.parameters]
warm_containers = "EAGER"
