AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Polymarket weather trader - scheduled fetch and trade Lambdas

Parameters:
  GitHubRepo:
    Type: String
    Description: GitHub repository as owner/name (e.g. myuser/polymarket-trader)
  GitBranch:
    Type: String
    Default: main
    Description: Branch to clone and push data commits
  Strategy:
    Type: String
    Default: highest_yes
  ShareCount:
    Type: String
    Default: '10'
  YesPriceMax:
    Type: String
    Default: '0.60'
  SelectionPriceSource:
    Type: String
    Default: midpoint
  OrderPriceSource:
    Type: String
    Default: midpoint
  OrderExpiryMinutes:
    Type: String
    Default: '25'
  TradingWindowStartHour:
    Type: String
    Default: '14:00'
  TradingWindowEndHour:
    Type: String
    Default: '16:00'
  SignatureType:
    Type: String
    Default: '1'
  StopLossPct:
    Type: String
    Default: '50'
  StopLossPctFloor:
    Type: String
    Default: '10'
  StopLossEventSlugMarker:
    Type: String
    Default: highest-temperature-in-
  StopLossDryRun:
    Type: String
    Default: 'true'
  StopLossScheduleEnabled:
    Type: String
    Default: 'false'
  StopLossOrderExpiryMinutes:
    Type: String
    Default: '13'
  StopLossMinLocalTime:
    Type: String
    Default: '16:30'

Conditions:
  StopLossScheduleIsEnabled: !Equals [!Ref StopLossScheduleEnabled, 'true']

Globals:
  Function:
    Architectures:
      - x86_64

Resources:
  TraderSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Description: API keys, wallet credentials, and GitHub PAT for polymarket-trader

  FetchDailyFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: polymarket-trader-fetch-daily
      PackageType: Image
      ImageConfig:
        Command:
          - lambda_handlers.fetch_daily.handler
      Timeout: 300
      MemorySize: 512
      Environment:
        Variables:
          SECRETS_ARN: !Ref TraderSecret
          GIT_REPO: !Ref GitHubRepo
          GIT_BRANCH: !Ref GitBranch
      Policies:
        - AWSSecretsManagerGetSecretValuePolicy:
            SecretArn: !Ref TraderSecret
    Metadata:
      Dockerfile: infrastructure/Dockerfile
      DockerContext: ..
      DockerTag: polymarket-trader-v1

  TradeHourlyFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: polymarket-trader-trade-hourly
      PackageType: Image
      ImageConfig:
        Command:
          - lambda_handlers.trade_hourly.handler
      Timeout: 900
      MemorySize: 1024
      Environment:
        Variables:
          SECRETS_ARN: !Ref TraderSecret
          GIT_REPO: !Ref GitHubRepo
          GIT_BRANCH: !Ref GitBranch
          STRATEGY: !Ref Strategy
          SHARE_COUNT: !Ref ShareCount
          YES_PRICE_MAX: !Ref YesPriceMax
          SELECTION_PRICE_SOURCE: !Ref SelectionPriceSource
          ORDER_PRICE_SOURCE: !Ref OrderPriceSource
          ORDER_EXPIRY_MINUTES: !Ref OrderExpiryMinutes
          TRADING_WINDOW_START_HOUR: !Ref TradingWindowStartHour
          TRADING_WINDOW_END_HOUR: !Ref TradingWindowEndHour
          SIGNATURE_TYPE: !Ref SignatureType
          STOP_LOSS_PCT_FLOOR: !Ref StopLossPctFloor
      Policies:
        - AWSSecretsManagerGetSecretValuePolicy:
            SecretArn: !Ref TraderSecret
    Metadata:
      Dockerfile: infrastructure/Dockerfile
      DockerContext: ..
      DockerTag: polymarket-trader-v1

  StopLossCheckFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: polymarket-trader-stop-loss-check
      PackageType: Image
      ImageConfig:
        Command:
          - lambda_handlers.stop_loss_check.handler
      Timeout: 900
      MemorySize: 1024
      Environment:
        Variables:
          SECRETS_ARN: !Ref TraderSecret
          GIT_REPO: !Ref GitHubRepo
          GIT_BRANCH: !Ref GitBranch
          STOP_LOSS_PCT: !Ref StopLossPct
          STOP_LOSS_PCT_FLOOR: !Ref StopLossPctFloor
          STOP_LOSS_EVENT_SLUG_MARKER: !Ref StopLossEventSlugMarker
          STOP_LOSS_DRY_RUN: !Ref StopLossDryRun
          STOP_LOSS_SCHEDULE_ENABLED: !Ref StopLossScheduleEnabled
          STOP_LOSS_ORDER_EXPIRY_MINUTES: !Ref StopLossOrderExpiryMinutes
          STOP_LOSS_MIN_LOCAL_TIME: !Ref StopLossMinLocalTime
          SIGNATURE_TYPE: !Ref SignatureType
      Policies:
        - AWSSecretsManagerGetSecretValuePolicy:
            SecretArn: !Ref TraderSecret
    Metadata:
      Dockerfile: infrastructure/Dockerfile
      DockerContext: ..
      DockerTag: polymarket-trader-v1

  SyncTradeHistoryFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: polymarket-trader-sync-trade-history
      PackageType: Image
      ImageConfig:
        Command:
          - lambda_handlers.sync_trade_history.handler
      Timeout: 900
      MemorySize: 1024
      Environment:
        Variables:
          SECRETS_ARN: !Ref TraderSecret
          GIT_REPO: !Ref GitHubRepo
          GIT_BRANCH: !Ref GitBranch
      Policies:
        - AWSSecretsManagerGetSecretValuePolicy:
            SecretArn: !Ref TraderSecret
    Metadata:
      Dockerfile: infrastructure/Dockerfile
      DockerContext: ..
      DockerTag: polymarket-trader-v1

  SchedulerRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: scheduler.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeTraderLambdas
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource:
                  - !GetAtt FetchDailyFunction.Arn
                  - !GetAtt TradeHourlyFunction.Arn
                  - !GetAtt StopLossCheckFunction.Arn
                  - !GetAtt SyncTradeHistoryFunction.Arn

  FetchDailySchedule:
    Type: AWS::Scheduler::Schedule
    Properties:
      Name: polymarket-trader-fetch-daily
      Description: Fetch events daily at 00:01 Hong Kong time
      ScheduleExpression: cron(1 0 * * ? *)
      ScheduleExpressionTimezone: Asia/Hong_Kong
      FlexibleTimeWindow:
        Mode: 'OFF'
      State: ENABLED
      Target:
        Arn: !GetAtt FetchDailyFunction.Arn
        RoleArn: !GetAtt SchedulerRole.Arn
        RetryPolicy:
          MaximumRetryAttempts: 2

  TradeHourlySchedule:
    Type: AWS::Scheduler::Schedule
    Properties:
      Name: polymarket-trader-trade-hourly
      Description: Trade at :05 and :35 UTC each hour; gate skips when no event is in local trading window
      ScheduleExpression: cron(5,35 * * * ? *)
      ScheduleExpressionTimezone: UTC
      FlexibleTimeWindow:
        Mode: 'OFF'
      State: ENABLED
      Target:
        Arn: !GetAtt TradeHourlyFunction.Arn
        RoleArn: !GetAtt SchedulerRole.Arn
        RetryPolicy:
          MaximumRetryAttempts: 2

  StopLossSchedule:
    Type: AWS::Scheduler::Schedule
    Properties:
      Name: polymarket-trader-stop-loss-check
      Description: Stop-loss check every 15 minutes UTC
      ScheduleExpression: cron(0/15 * * * ? *)
      ScheduleExpressionTimezone: UTC
      FlexibleTimeWindow:
        Mode: 'OFF'
      State: !If [StopLossScheduleIsEnabled, ENABLED, DISABLED]
      Target:
        Arn: !GetAtt StopLossCheckFunction.Arn
        RoleArn: !GetAtt SchedulerRole.Arn
        RetryPolicy:
          MaximumRetryAttempts: 2

  SyncTradeHistorySchedule:
    Type: AWS::Scheduler::Schedule
    Properties:
      Name: polymarket-trader-sync-trade-history
      Description: Sync wallet trade history every 3 hours UTC
      ScheduleExpression: cron(0 */3 * * ? *)
      ScheduleExpressionTimezone: UTC
      FlexibleTimeWindow:
        Mode: 'OFF'
      State: ENABLED
      Target:
        Arn: !GetAtt SyncTradeHistoryFunction.Arn
        RoleArn: !GetAtt SchedulerRole.Arn
        RetryPolicy:
          MaximumRetryAttempts: 2

Outputs:
  FetchDailyFunctionArn:
    Description: Fetch daily Lambda ARN
    Value: !GetAtt FetchDailyFunction.Arn
  TradeHourlyFunctionArn:
    Description: Trade hourly Lambda ARN
    Value: !GetAtt TradeHourlyFunction.Arn
  StopLossCheckFunctionArn:
    Description: Stop-loss check Lambda ARN
    Value: !GetAtt StopLossCheckFunction.Arn
  SyncTradeHistoryFunctionArn:
    Description: Sync trade history Lambda ARN
    Value: !GetAtt SyncTradeHistoryFunction.Arn
  TraderSecretArn:
    Description: Secrets Manager ARN — set JSON credentials here after first deploy
    Value: !Ref TraderSecret
