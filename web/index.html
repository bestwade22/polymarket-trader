<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Temp Market Trade History</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Temperature Market Trade History</h1>
    <p id="sync-meta">Loading…</p>
  </header>

  <section class="filters">
    <label>
      Result
      <select id="filter-result">
        <option value="">All</option>
        <option value="win">Win</option>
        <option value="loss">Loss</option>
        <option value="sold">Sold</option>
        <option value="open">Open</option>
      </select>
    </label>
    <label>
      Timezone group
      <select id="filter-timezone"><option value="">All</option></select>
    </label>
    <label>
      City
      <select id="filter-city"><option value="">All</option></select>
    </label>
    <label>
      City local buy time
      <select id="filter-local-time">
        <option value="">All</option>
        <option value="before-12:00">Before 12:00</option>
      </select>
    </label>
    <label>
      Win temp vs bought
      <select id="filter-vs">
        <option value="">All</option>
        <option value="higher">Higher (won hotter)</option>
        <option value="lower">Lower (won cooler)</option>
        <option value="same">Same</option>
      </select>
    </label>
    <label>
      Sold but would win
      <select id="filter-regret">
        <option value="">All</option>
        <option value="true">Yes</option>
        <option value="false">No</option>
      </select>
    </label>
    <label>
      Buy price band
      <select id="filter-price">
        <option value="">All</option>
        <option value="<0.40">&lt;0.40</option>
        <option value="0.40–0.50">0.40–0.50</option>
        <option value="0.50–0.55">0.50–0.55</option>
        <option value="0.55–0.60">0.55–0.60</option>
        <option value="0.60–0.70">0.60–0.70</option>
        <option value=">0.70">&gt;0.70</option>
      </select>
    </label>
    <label>
      From
      <input type="date" id="filter-date-from" />
    </label>
    <label>
      To
      <input type="date" id="filter-date-to" />
    </label>
  </section>

  <section id="summary-panel" class="summary-panel">
    <div id="summary-content">Summary loading…</div>
  </section>

  <details id="insights-panel" class="insights">
    <summary>Strategy insights</summary>
    <div id="insights-content"></div>
  </details>

  <div class="table-wrap">
    <table id="trade-table">
      <thead>
        <tr>
          <th data-sort="date">Date</th>
          <th data-sort="city">City</th>
          <th data-sort="bought_temp">Bought temp</th>
          <th data-sort="bought_at_hk">Bought (HKT)</th>
          <th data-sort="bought_at_local">Bought (local)</th>
          <th data-sort="cost_basis_usd">Bought value</th>
          <th data-sort="sold_at">Sold</th>
          <th data-sort="shares">Shares</th>
          <th data-sort="buy_price">Buy $</th>
          <th data-sort="result">Result</th>
          <th data-sort="final_value_usd">P&amp;L</th>
          <th data-sort="winning_temp">Won temp</th>
          <th data-sort="win_temp_vs_bought">Win vs bought</th>
          <th data-sort="sold_but_would_have_won">Sold→win?</th>
          <th data-sort="sell_value_pct">Sell %</th>
        </tr>
      </thead>
      <tbody id="trade-body"></tbody>
    </table>
  </div>

  <script src="app.js"></script>
</body>
</html>
