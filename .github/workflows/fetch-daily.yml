name: Fetch daily events

on:
  schedule:
    # 16:01 UTC = 00:01 HKT
    - cron: "1 16 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "Event date YYYY-MM-DD (default: today in Hong Kong)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Resolve event date (Hong Kong)
        id: date
        run: |
          if [ -n "${{ inputs.date }}" ]; then
            echo "value=${{ inputs.date }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=$(TZ=Asia/Hong_Kong date +%Y-%m-%d)" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch events
        env:
          API_NINJAS_KEY: ${{ secrets.API_NINJAS_KEY }}
        run: python -m src.main fetch-daily --date "${{ steps.date.outputs.value }}"

      - name: Commit events JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f "data/events_${{ steps.date.outputs.value }}.json"
          git diff --staged --quiet || git commit -m "chore(data): fetch events ${{ steps.date.outputs.value }}"
          git push
