name: Trade hourly

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "Event date YYYY-MM-DD (default: today UTC)"
        required: false
        type: string
      force:
        description: "Run even outside global trading window"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: trade-hourly
  cancel-in-progress: false

jobs:
  trade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check global trading window
        id: gate
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.force != true }}
        run: |
          if python scripts/should_run_trade.py; then
            echo "active=true" >> "$GITHUB_OUTPUT"
          else
            echo "active=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Mark forced run
        id: force
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.force == true }}
        run: echo "active=true" >> "$GITHUB_OUTPUT"

      - name: Skip outside trading window
        if: >-
          steps.force.outputs.active != 'true' &&
          steps.gate.outputs.active != 'true'
        run: |
          echo "Outside global trading window; skipping trade-hourly."
          exit 0

      - name: Resolve event date
        id: date
        if: >-
          steps.force.outputs.active == 'true' ||
          steps.gate.outputs.active == 'true'
        run: |
          if [ -n "${{ inputs.date }}" ]; then
            echo "value=${{ inputs.date }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"
          fi

      - name: Run trade-hourly
        if: >-
          steps.force.outputs.active == 'true' ||
          steps.gate.outputs.active == 'true'
        id: trade
        env:
          API_NINJAS_KEY: ${{ secrets.API_NINJAS_KEY }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          DEPOSIT_WALLET_ADDRESS: ${{ secrets.DEPOSIT_WALLET_ADDRESS }}
          DRY_RUN: ${{ secrets.DRY_RUN }}
          SIGNATURE_TYPE: ${{ vars.SIGNATURE_TYPE || '1' }}
          STRATEGY: ${{ vars.STRATEGY || 'highest_yes' }}
          SHARE_COUNT: ${{ vars.SHARE_COUNT || '10' }}
          YES_PRICE_MAX: ${{ vars.YES_PRICE_MAX || '0.60' }}
          SELECTION_PRICE_SOURCE: ${{ vars.SELECTION_PRICE_SOURCE || 'midpoint' }}
          ORDER_PRICE_SOURCE: ${{ vars.ORDER_PRICE_SOURCE || 'midpoint' }}
          ORDER_EXPIRY_HOURS: ${{ vars.ORDER_EXPIRY_HOURS || '2' }}
          TRADING_WINDOW_START_HOUR: ${{ vars.TRADING_WINDOW_START_HOUR || '12' }}
          TRADING_WINDOW_END_HOUR: ${{ vars.TRADING_WINDOW_END_HOUR || '14' }}
        run: |
          set -euo pipefail
          ARGS=(--date "${{ steps.date.outputs.value }}")
          if [ "${DRY_RUN:-true}" = "false" ]; then
            ARGS+=(--live)
          fi
          python -m src.main trade-hourly "${ARGS[@]}" | tee trade_output.log

      - name: Job summary
        if: >-
          steps.force.outputs.active == 'true' ||
          steps.gate.outputs.active == 'true'
        run: |
          {
            echo "### trade-hourly ${{ steps.date.outputs.value }}"
            echo '```'
            tail -n 30 trade_output.log || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Commit selection results
        if: >-
          steps.force.outputs.active == 'true' ||
          steps.gate.outputs.active == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          shopt -s nullglob
          files=(data/selections/markets_yes_${{ steps.date.outputs.value }}_*.json)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No selection snapshots to commit."
            exit 0
          fi
          git add -f "${files[@]}"
          git diff --staged --quiet || git commit -m "chore(data): trade selections ${{ steps.date.outputs.value }}"
          git push

      - name: Commit bought events audit log
        if: >-
          steps.force.outputs.active == 'true' ||
          steps.gate.outputs.active == 'true'
        run: |
          if [ -f data/positions/bought_events.json ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -f data/positions/bought_events.json
            git diff --staged --quiet || git commit -m "chore(data): bought events audit ${{ steps.date.outputs.value }}"
            git push
          fi

      - name: Upload trade logs
        if: >-
          steps.force.outputs.active == 'true' ||
          steps.gate.outputs.active == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: trade-logs-${{ steps.date.outputs.value }}-${{ github.run_id }}
          path: |
            logs/
          if-no-files-found: ignore
          retention-days: 90
