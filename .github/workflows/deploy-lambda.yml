name: Deploy Lambda

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'config/**'
      - 'lambda_handlers/**'
      - 'infrastructure/**'
      - 'requirements.txt'
      - 'scripts/**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'ap-east-1' }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install SAM CLI
        run: pip install aws-sam-cli

      - name: SAM build
        working-directory: infrastructure
        run: sam build

      - name: SAM deploy
        working-directory: infrastructure
        run: |
          sam deploy \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --capabilities CAPABILITY_IAM CAPABILITY_NAMED_IAM \
            --parameter-overrides \
              "GitHubRepo=${{ vars.REPO_SLUG }} \
              GitBranch=main \
              TradingWindowStartHour=14:00 \
              TradingWindowEndHour=16:00 \
              ShareCount=10 \
              OrderExpiryMinutes=25 \
              StopLossPct=50 \
              StopLossPctFloor=10 \
              StopLossDryRun=true \
              StopLossScheduleEnabled=false \
              StopLossOrderExpiryMinutes=13 \
              StopLossMinLocalTime=16:30"

      - name: Diagnose CloudFormation failure
        if: failure()
        env:
          AWS_REGION: ${{ vars.AWS_REGION || 'ap-east-1' }}
        run: |
          for stack in aws-sam-cli-managed-default polymarket-trader; do
            echo "=== Stack status: $stack ==="
            aws cloudformation describe-stacks \
              --stack-name "$stack" \
              --query 'Stacks[0].[StackName,StackStatus]' \
              --output table 2>/dev/null || echo "(stack $stack not found)"
            echo "=== Recent events: $stack ==="
            aws cloudformation describe-stack-events \
              --stack-name "$stack" \
              --max-items 20 \
              --query 'StackEvents[].[Timestamp,ResourceStatus,LogicalResourceId,ResourceStatusReason]' \
              --output table 2>/dev/null || true
          done
