name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - 'data/analysis/**'
      - 'data/city_timezones.json'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare site
        run: |
          mkdir -p _site/web _site/data/analysis
          cp -r web/. _site/web/
          cp data/analysis/trade_history.json _site/data/analysis/
          cp data/analysis/sim_trade_history.json _site/data/analysis/
          cp data/analysis/resolutions_cache.json _site/data/analysis/
          printf '%s\n' \
            '<!DOCTYPE html>' \
            '<meta http-equiv="refresh" content="0; url=web/">' \
            '<p><a href="web/">Trade history</a> · <a href="web/simulator.html">Simulator</a></p>' \
            > _site/index.html

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages

      - name: Pages URL
        run: |
          echo "::notice title=History dashboard::https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/web/"
          echo "::notice title=Simulator dashboard::https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/web/simulator.html"
          echo "::notice title=One-time setup (if site 404)::Settings → Pages → Build and deployment → Source: Deploy from branch → gh-pages / (root)"
